[versions]
agp = "9.0.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
material = "1.13.0"
activity = "1.12.3"
constraintlayout = "2.2.1"
retrofit = "2.11.0"
glide = "4.16.0"
room = "2.8.4"
shimmer = "0.5.0"
circleimageview = "3.1.0"
swiperefreshlayout = "1.2.0"
navigationFragmentKtx = "2.9.7"
navigationUiKtx = "2.9.7"
googleGmsGoogleServices = "4.4.4"
firebaseAuth = "24.0.1"
credentials = "1.6.0"
credentialsPlayServicesAuth = "1.6.0"
googleid = "1.1.1"
firebaseDatabase = "22.0.1"
firebaseFirestore = "26.2.0"
